{% extends "layout/arena_base.html" %}
{% block title %}Forgot Password — ARENA Sports Luxury{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="glass-card p-5 text-center" style="max-width:460px;width:100%;">
        <i class="fas fa-key fa-3x text-gold mb-4"></i>
        <h2 class="mb-2">Forgot Password?</h2>
        <p class="text-muted-arena mb-5">Enter your email to receive a reset link.</p>
        <form action="{{ url_for('customer.login') }}">
            <div class="mb-4"><input type="email" class="arena-input" placeholder="Email Address" required></div>
            <button type="submit" class="btn-arena w-100 justify-content-center">Send Reset Link</button>
            <div class="mt-4"><a href="{{ url_for('customer.login') }}" class="text-gold text-decoration-none small">Back to Login</a></div>
        </form>
    </div>
</div>
{% endblock %}
