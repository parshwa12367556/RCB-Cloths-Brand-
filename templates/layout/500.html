{% extends "layout/arena_base.html" %}
{% block title %}500 — Arena Error{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center text-center">
    <div>
        <h1 class="giant-title" style="font-size:clamp(5rem,15vw,12rem);color:var(--victory-red);">500</h1>
        <h2 class="mb-4" style="font-family:var(--font-sports);letter-spacing:4px;">INTERNAL ARENA ERROR</h2>
        <p class="text-muted-arena mb-5" style="max-width:500px;margin:0 auto;">The stadium systems are down. Our team is working to restore the energy.</p>
        <a href="{{ url_for('index') }}" class="btn-arena"><i class="fas fa-home me-2"></i> Return to Arena</a>
    </div>
</div>
{% endblock %}
